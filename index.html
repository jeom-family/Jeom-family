<!DOCTYPE html><html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEOM FAMILY</title><style>
body{margin:0;font-family:sans-serif;background:#020a06;color:#fff;overflow-x:hidden}

/* 🌿 움직이는 테라리움 배경 */
body::before{
  content:"";
  position:fixed;
  width:200%;height:200%;
  background:radial-gradient(circle, rgba(0,255,150,.1), transparent 60%);
  animation:bgMove 20s linear infinite;
  z-index:-1;
}

@keyframes bgMove{
  0%{transform:translate(0,0)}
  50%{transform:translate(-25%,-25%)}
  100%{transform:translate(0,0)}
}

.container{text-align:center;padding:20px}

.title{
  font-size:50px;
  font-weight:900;
  animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 5px #22c55e }
  to{ text-shadow:0 0 20px #22c55e,0 0 30px #22c55e }
}

.subtitle{color:#22c55e}

.character{
  width:130px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  50%{transform:translateY(-15px)}
}

.hero{
  position:relative;
  margin:30px 0;
  overflow:hidden;
}

.hero img{
  width:100%;
  max-height:420px;
  object-fit:cover;
  border-radius:20px;
  animation:zoom 10s ease-in-out infinite;
}

@keyframes zoom{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

.hero-text{
  position:absolute;
  bottom:20px;
  left:20px;
}

.card-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:#02150d;
  border-radius:20px;
  overflow:hidden;
  transform:translateY(50px);
  opacity:0;
  animation:fadeUp .8s forwards;
}

.card:nth-child(1){animation-delay:.2s}
.card:nth-child(2){animation-delay:.4s}
.card:nth-child(3){animation-delay:.6s}

@keyframes fadeUp{
  to{transform:translateY(0);opacity:1}
}

.card:hover{
  transform:scale(1.05) rotateX(5deg);
}

.card img{
  width:100%;height:200px;object-fit:cover;
}

.card-content{padding:15px}

.status{padding:4px 10px;border-radius:10px;font-size:12px}
.growing{background:#22c55e}
.ready{background:#eab308}
.available{background:#0ea5e9}
.sold{background:#ef4444}

.price{color:#f59e0b;margin-top:5px}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  border-radius:12px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,.7)}
  70%{box-shadow:0 0 0 20px rgba(34,197,94,0)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
}

</style></head>
<body><div class="container"><div class="title">JEOM FAMILY</div>
<div class="subtitle">ELITE BREEDING</div><img src="images/character.png" class="character"><div class="hero">
<img src="images/jumpai.jpg">
<div class="hero-text">
<h2>PREMIUM LINE</h2>
<p>Nature • Genetics</p>
</div>
</div><h2>GECKOS</h2><div class="card-container"><div class="card">
<img src="images/jumpai.jpg">
<div class="card-content">
<div class="status growing">성장중</div>
<h3>점파이</h3>
<div class="price">준비중</div>
</div>
</div><div class="card">
<img src="images/jumduri.jpg">
<div class="card-content">
<div class="status growing">성장중</div>
<h3>점두리</h3>
<div class="price">준비중</div>
</div>
</div><div class="card">
<img src="images/jumnine.jpg">
<div class="card-content">
<div class="status growing">성장중</div>
<h3>점나인</h3>
<div class="price">핵심</div>
</div>
</div></div><a href="https://instagram.com/hdsspnln_gecko" class="btn">DM 문의</a>

</div></body>
</html>
