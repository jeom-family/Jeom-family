<!DOCTYPE html><html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEOM FAMILY (Cre House)</title>
  <style>
    body{margin:0;font-family:sans-serif;background:#010805;color:#fff}
    body::before{content:"";position:fixed;width:100%;height:100%;background:radial-gradient(circle at 30% 20%,rgba(0,255,150,.15),transparent 40%),radial-gradient(circle at 70% 80%,rgba(0,255,150,.1),transparent 40%);z-index:-1}
    .container{text-align:center;padding:20px}
    .title{font-size:48px;font-weight:900}
    .subtitle{color:#22c55e}
    .character{width:120px;animation:float 3s infinite}
    @keyframes float{50%{transform:translateY(-10px)}}.card-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px}
.card{background:#02150d;border:1px solid rgba(0,255,150,.2);border-radius:20px;overflow:hidden;position:relative}
.card img{width:100%;height:200px;object-fit:cover}
.card-content{padding:15px}

.status{font-size:12px;padding:4px 10px;border-radius:10px;display:inline-block;margin-bottom:5px}
.available{background:#0ea5e9}
.ready{background:#eab308}
.growing{background:#22c55e}
.sold{background:#ef4444}

.price{font-weight:bold;color:#f59e0b;margin-top:8px}

.btn{display:inline-block;margin-top:10px;padding:8px 15px;border-radius:10px;background:#22c55e;color:#000;text-decoration:none;font-weight:bold}

.badge{position:absolute;top:10px;right:10px;background:red;padding:5px 10px;border-radius:10px;font-size:12px}

.filter{margin-top:20px}
.filter button{margin:5px;padding:8px 12px;border:none;border-radius:8px;background:#111;color:#fff}

  </style>
</head>
<body><div class="container">
  <div class="title">JEOM FAMILY</div>
  <div class="subtitle">PREMIUM CRESTED GECKO</div>
  <img src="images/character.png" class="character"> <div class="filter">
    <button onclick="filter('all')">전체</button>
    <button onclick="filter('available')">분양 가능</button>
    <button onclick="filter('growing')">성장중</button>
  </div> <div class="card-container" id="list"><div class="card growing">
  <img src="images/jumpai.jpg">
  <div class="card-content">
    <div class="status growing">성장중</div>
    <h3>점파이</h3>
    <div class="price">준비중</div>
  </div>
</div>

<div class="card growing">
  <img src="images/jumduri.jpg">
  <div class="card-content">
    <div class="status growing">성장중</div>
    <h3>점두리</h3>
    <div class="price">준비중</div>
  </div>
</div>

<div class="card ready">
  <div class="badge">MAIN</div>
  <img src="images/jumnine.jpg">
  <div class="card-content">
    <div class="status growing">성장중</div>
    <h3>점나인</h3>
    <div class="price">핵심 개체</div>
  </div>
</div>

  </div> <h2 style="margin-top:50px">CONTACT</h2>
  <a href="https://instagram.com/hdsspnln_gecko" class="btn">DM 문의</a></div><script>
function filter(type){
  const cards=document.querySelectorAll('.card');
  cards.forEach(c=>{
    if(type==='all'){c.style.display='block'}
    else if(c.classList.contains(type)){c.style.display='block'}
    else{c.style.display='none'}
  })
}
</script></body>
</html>
